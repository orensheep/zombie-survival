<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>殭屍生存戰</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;font-family:system-ui,sans-serif;padding:10px}
h1{font-size:18px;font-weight:500;color:#7af;letter-spacing:2px;margin-bottom:8px}
#hud{display:flex;gap:10px;align-items:center;width:100%;max-width:360px;margin-bottom:5px}
.hi{font-size:11px;color:#aaa;white-space:nowrap}
.hv{font-size:13px;font-weight:500;color:#fff}
#hpw{flex:1;height:8px;background:#333;border-radius:4px;overflow:hidden}
#hpb{height:100%;background:#4c4;border-radius:4px}
#bhud{width:100%;max-width:360px;margin-bottom:4px;display:none}
#bhl{font-size:11px;color:#f44;font-weight:500;margin-bottom:2px}
#bhw{width:100%;height:10px;background:#300;border-radius:4px;overflow:hidden;border:1px solid #600}
#bhb{height:100%;background:#f44;border-radius:4px}
#cv{border:1px solid #334;border-radius:6px;display:block;touch-action:none}
#bottom{display:flex;justify-content:space-between;align-items:flex-end;width:100%;max-width:360px;margin-top:10px;padding:0 4px}
#dpad{position:relative;width:120px;height:120px;flex-shrink:0}
.dp{position:absolute;width:38px;height:38px;border-radius:8px;background:rgba(80,120,200,0.25);border:1.5px solid rgba(100,150,255,0.4);display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(180,210,255,0.8);touch-action:none;cursor:pointer}
.dp.active{background:rgba(80,120,200,0.55);border-color:rgba(150,200,255,0.8)}
#dp-up{top:0;left:41px}
#dp-down{bottom:0;left:41px}
#dp-left{top:41px;left:0}
#dp-right{top:41px;right:0}
#dp-mid{top:41px;left:41px;border-radius:50%;background:rgba(60,90,160,0.2)}
#right-controls{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
#fire-btn{width:72px;height:72px;border-radius:50%;background:rgba(220,60,60,0.3);border:2.5px solid rgba(255,100,100,0.6);display:flex;align-items:center;justify-content:center;font-size:28px;touch-action:none;cursor:pointer}
#fire-btn.active{background:rgba(220,60,60,0.65);border-color:rgba(255,180,180,0.9)}
#sk-row{display:flex;gap:5px}
.skb{width:52px;height:38px;border-radius:8px;background:rgba(40,60,120,0.35);border:1.5px solid rgba(80,120,200,0.4);display:flex;flex-direction:column;align-items:center;justify-content:center;touch-action:none;cursor:pointer}
.skb.active{background:rgba(40,60,120,0.7)}
.skb.disabled{opacity:0.3}
.skb-icon{font-size:14px;line-height:1}
.skb-cd{font-size:9px;color:#89a;margin-top:2px}
#ov{width:100%;max-width:360px;margin-top:14px;text-align:center;padding:20px 16px;background:#111a2e;border-radius:10px;border:1px solid #224}
#omsg{font-size:20px;font-weight:500;color:#fff;margin-bottom:6px}
#osub{font-size:12px;color:#aaa;margin-bottom:14px;line-height:1.7}
#obtn{padding:10px 32px;font-size:15px;cursor:pointer;border:1.5px solid #4af;border-radius:8px;background:transparent;color:#4af}
#obtn:active{background:rgba(68,170,255,0.15)}
#hint{font-size:10px;color:#445;margin-top:10px;line-height:1.9;text-align:center;width:100%;max-width:360px}
</style>
</head>
<body>
<h1>🧟 殭屍生存戰</h1>
<div id="hud">
  <div class="hi">HP <span class="hv" id="hptxt">100</span></div>
  <div id="hpw"><div id="hpb" style="width:100%"></div></div>
  <div class="hi">擊殺 <span class="hv" id="kl">0</span></div>
  <div class="hi">關 <span class="hv" id="wv">1</span></div>
  <div class="hi">目標 <span class="hv" id="gl">10</span></div>
</div>
<div id="bhud">
  <div id="bhl">👹 殭屍魔王</div>
  <div id="bhw"><div id="bhb" style="width:100%"></div></div>
</div>
<canvas id="cv" width="360" height="320" tabindex="0"></canvas>
<div id="bottom">
  <div id="dpad">
    <div class="dp" id="dp-up">▲</div>
    <div class="dp" id="dp-down">▼</div>
    <div class="dp" id="dp-left">◀</div>
    <div class="dp" id="dp-right">▶</div>
    <div class="dp" id="dp-mid"></div>
  </div>
  <div id="right-controls">
    <div id="sk-row">
      <div class="skb" id="skb0"><span class="skb-icon">💥</span><span class="skb-cd" id="scd0">就緒</span></div>
      <div class="skb" id="skb1"><span class="skb-icon">⚡</span><span class="skb-cd" id="scd1">就緒</span></div>
      <div class="skb" id="skb2"><span class="skb-icon">🛡</span><span class="skb-cd" id="scd2">就緒</span></div>
      <div class="skb" id="skb3"><span class="skb-icon">❤️</span><span class="skb-cd" id="scd3">就緒</span></div>
    </div>
    <div id="fire-btn">🔥</div>
  </div>
</div>
<div id="ov">
  <div id="omsg">殭屍生存戰</div>
  <div id="osub">第1、2關消滅殭屍<br>第3關打倒魔王！<br>D-pad 移動，🔥 射擊（自動瞄準）</div>
  <button id="obtn">開始遊戲</button>
</div>
<div id="hint">電腦：WASD 移動 | 空白鍵 射擊 | 1~4 技能</div>

<script>
const cv=document.getElementById('cv');
const cx=cv.getContext('2d');
const W=360,H=320;
let gs='menu';
let pl,buls,zoms,parts,fxs,bbuls;
let kills,wave,goalK,fid;
let sfl=0,sfc='#fff';
let boss=null,bwarn=0,bwt='';
let shOn=false,shT=0;
let scd2=0,spt=0;
const wKG=[10,20,0];
const skMC=[600,400,500,360];
let skCd=[0,0,0,0];
let dpad={up:false,down:false,left:false,right:false};
let firing=false;
let autoAimAngle=0;
const AC=new(window.AudioContext||window.webkitAudioContext)();

function snd(t){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    const n=AC.currentTime;
    if(t==='shoot'){o.type='square';o.frequency.setValueAtTime(880,n);o.frequency.exponentialRampToValueAtTime(220,n+.08);g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.08);o.start(n);o.stop(n+.08);}
    else if(t==='hit'){o.type='sawtooth';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(60,n+.12);g.gain.setValueAtTime(.18,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);o.start(n);o.stop(n+.12);}
    else if(t==='kill'){o.type='sine';o.frequency.setValueAtTime(440,n);o.frequency.exponentialRampToValueAtTime(880,n+.1);g.gain.setValueAtTime(.15,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);o.start(n);o.stop(n+.12);}
    else if(t==='dmg'){o.type='sawtooth';o.frequency.setValueAtTime(150,n);o.frequency.exponentialRampToValueAtTime(40,n+.2);g.gain.setValueAtTime(.3,n);g.gain.exponentialRampToValueAtTime(.001,n+.2);o.start(n);o.stop(n+.2);}
    else if(t==='nuke'){o.type='sawtooth';o.frequency.setValueAtTime(80,n);o.frequency.exponentialRampToValueAtTime(20,n+.5);g.gain.setValueAtTime(.4,n);g.gain.exponentialRampToValueAtTime(.001,n+.5);o.start(n);o.stop(n+.5);const o2=AC.createOscillator(),g2=AC.createGain();o2.connect(g2);g2.connect(AC.destination);o2.type='square';o2.frequency.setValueAtTime(600,n);o2.frequency.exponentialRampToValueAtTime(50,n+.45);g2.gain.setValueAtTime(.28,n);g2.gain.exponentialRampToValueAtTime(.001,n+.45);o2.start(n);o2.stop(n+.45);}
    else if(t==='ltng'){o.type='square';o.frequency.setValueAtTime(1200,n);o.frequency.exponentialRampToValueAtTime(100,n+.25);g.gain.setValueAtTime(.28,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);o.start(n);o.stop(n+.25);}
    else if(t==='shld'){o.type='sine';o.frequency.setValueAtTime(300,n);o.frequency.linearRampToValueAtTime(600,n+.2);o.frequency.linearRampToValueAtTime(300,n+.4);g.gain.setValueAtTime(.18,n);g.gain.exponentialRampToValueAtTime(.001,n+.4);o.start(n);o.stop(n+.4);}
    else if(t==='heal'){o.type='sine';o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+.1);o.frequency.setValueAtTime(784,n+.2);g.gain.setValueAtTime(.18,n);g.gain.exponentialRampToValueAtTime(.001,n+.32);o.start(n);o.stop(n+.32);}
    else if(t==='clr'){o.type='sine';o.frequency.setValueAtTime(440,n);o.frequency.setValueAtTime(550,n+.12);o.frequency.setValueAtTime(660,n+.25);o.frequency.setValueAtTime(880,n+.38);g.gain.setValueAtTime(.22,n);g.gain.exponentialRampToValueAtTime(.001,n+.55);o.start(n);o.stop(n+.55);}
    else if(t==='bapp'){o.type='sawtooth';o.frequency.setValueAtTime(60,n);o.frequency.linearRampToValueAtTime(200,n+.3);o.frequency.linearRampToValueAtTime(40,n+.8);g.gain.setValueAtTime(.45,n);g.gain.exponentialRampToValueAtTime(.001,n+.8);o.start(n);o.stop(n+.8);const o2=AC.createOscillator(),g2=AC.createGain();o2.connect(g2);g2.connect(AC.destination);o2.type='square';o2.frequency.setValueAtTime(120,n+.4);o2.frequency.exponentialRampToValueAtTime(30,n+1);g2.gain.setValueAtTime(.28,n+.4);g2.gain.exponentialRampToValueAtTime(.001,n+1);o2.start(n+.4);o2.stop(n+1);}
    else if(t==='bsh'){o.type='sawtooth';o.frequency.setValueAtTime(280,n);o.frequency.exponentialRampToValueAtTime(70,n+.18);g.gain.setValueAtTime(.22,n);g.gain.exponentialRampToValueAtTime(.001,n+.18);o.start(n);o.stop(n+.18);}
    else if(t==='brr'){o.type='sawtooth';o.frequency.setValueAtTime(100,n);o.frequency.linearRampToValueAtTime(280,n+.12);o.frequency.linearRampToValueAtTime(40,n+.45);g.gain.setValueAtTime(.4,n);g.gain.exponentialRampToValueAtTime(.001,n+.45);o.start(n);o.stop(n+.45);}
    else if(t==='bdie'){for(let i=0;i<4;i++){const oo=AC.createOscillator(),gg=AC.createGain();oo.connect(gg);gg.connect(AC.destination);oo.type='sawtooth';oo.frequency.setValueAtTime(180-i*25,n+i*.12);oo.frequency.exponentialRampToValueAtTime(15,n+i*.12+.35);gg.gain.setValueAtTime(.3,n+i*.12);gg.gain.exponentialRampToValueAtTime(.001,n+i*.12+.35);oo.start(n+i*.12);oo.stop(n+i*.12+.35);}}
  }catch(e){}
}
function ra(){AC.resume();}

function startGame(){
  ra();
  gs='playing';wave=1;kills=0;goalK=wKG[0];
  pl={x:W/2,y:H/2,r:12,hp:100,mhp:100,spd:2.5};
  buls=[];zoms=[];parts=[];fxs=[];bbuls=[];
  boss=null;bwarn=0;scd2=0;spt=0;shOn=false;shT=0;sfl=0;
  skCd=[0,0,0,0];autoAimAngle=0;
  document.getElementById('ov').style.display='none';
  document.getElementById('bhud').style.display='none';
  uHUD();uSkUI();cancelAnimationFrame(fid);loop();
}

function uHUD(){
  document.getElementById('hptxt').textContent=Math.max(0,Math.round(pl.hp));
  document.getElementById('hpb').style.width=Math.max(0,pl.hp/pl.mhp*100)+'%';
  document.getElementById('hpb').style.background=pl.hp>50?'#4c4':pl.hp>25?'#fa0':'#e44';
  document.getElementById('kl').textContent=kills;
  document.getElementById('wv').textContent=wave;
  document.getElementById('gl').textContent=boss?'魔王!':Math.max(0,goalK-kills);
  if(boss){
    document.getElementById('bhud').style.display='';
    document.getElementById('bhb').style.width=(boss.hp/boss.mhp*100)+'%';
    const p=boss.hp/boss.mhp;
    document.getElementById('bhb').style.background=p>.5?'#f44':p>.25?'#f80':'#ff0';
  }
}

function uSkUI(){
  skCd.forEach((c,i)=>{
    const b=document.getElementById('skb'+i);
    b.className='skb'+(c>0||gs!=='playing'?' disabled':'');
    document.getElementById('scd'+i).textContent=c>0?Math.ceil(c/60)+'s':'就緒';
  });
}

function pts(x,y,col,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*2.5;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col});}
}

function spawnZ(){
  const side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=Math.random()*W;y=-18;}
  else if(side===1){x=W+18;y=Math.random()*H;}
  else if(side===2){x=Math.random()*W;y=H+18;}
  else{x=-18;y=Math.random()*H;}
  zoms.push({x,y,r:14,hp:2+wave,mhp:2+wave,spd:.7+wave*.25+Math.random()*.35,dead:false});
}

function spawnBoss(){
  boss={x:W/2,y:32,r:24,hp:120,mhp:120,spd:1.1,shT:0,aT:0,chrg:false,cvx:0,cvy:0,cT:0,enraged:false,ang:0};
  bwarn=130;bwt='👹 殭屍魔王降臨！';
  snd('bapp');document.getElementById('bhud').style.display='';uHUD();
}

function getAutoAim(){
  let best=null,bd=9999;
  if(boss){bd=Math.hypot(boss.x-pl.x,boss.y-pl.y);best=boss;}
  zoms.forEach(z=>{const d=Math.hypot(z.x-pl.x,z.y-pl.y);if(d<bd){bd=d;best=z;}});
  if(best) return Math.atan2(best.y-pl.y,best.x-pl.x);
  return autoAimAngle;
}

function shoot(){
  if(gs!=='playing'||scd2>0) return;
  const a=getAutoAim();
  autoAimAngle=a;
  buls.push({x:pl.x+Math.cos(a)*18,y:pl.y+Math.sin(a)*18,vx:Math.cos(a)*9,vy:Math.sin(a)*9,life:55});
  scd2=6;snd('shoot');
}

function useSkill(i){
  if(gs!=='playing'||skCd[i]>0) return;
  ra();
  if(i===0){
    snd('nuke');sfl=20;sfc='#f80';
    const c=zoms.length;zoms.forEach(z=>pts(z.x,z.y,'#f80',10));zoms=[];kills+=c;
    if(boss){boss.hp-=50;pts(boss.x,boss.y,'#f80',20);}
    skCd[0]=skMC[0];uHUD();checkBossDead();
  } else if(i===1){
    snd('ltng');sfl=8;sfc='#aaf';
    const tgts=[...zoms].sort((a,b)=>Math.hypot(a.x-pl.x,a.y-pl.y)-Math.hypot(b.x-pl.x,b.y-pl.y)).slice(0,5);
    tgts.forEach(z=>{z.hp=0;z.dead=true;kills++;pts(z.x,z.y,'#88f',8);fxs.push({x1:pl.x,y1:pl.y,x2:z.x,y2:z.y,life:12});});
    zoms=zoms.filter(z=>!z.dead);
    if(boss){boss.hp-=35;fxs.push({x1:pl.x,y1:pl.y,x2:boss.x,y2:boss.y,life:18});pts(boss.x,boss.y,'#88f',10);}
    skCd[1]=skMC[1];uHUD();checkBossDead();
  } else if(i===2){
    snd('shld');shOn=true;shT=300;skCd[2]=skMC[2];
  } else if(i===3){
    snd('heal');pl.hp=Math.min(pl.mhp,pl.hp+50);pts(pl.x,pl.y,'#4f4',12);skCd[3]=skMC[3];uHUD();
  }
  uSkUI();
}

function checkBossDead(){
  if(!boss||boss.hp>0) return;
  snd('bdie');
  for(let i=0;i<30;i++) pts(boss.x+(Math.random()*70-35),boss.y+(Math.random()*70-35),['#f44','#f80','#ff0','#f0f'][Math.floor(Math.random()*4)],6);
  sfl=35;sfc='#ff0';kills+=5;
  boss=null;bbuls=[];
  document.getElementById('bhud').style.display='none';
  uHUD();winGame();
}

function updBoss(){
  if(!boss) return;
  boss.ang+=.025;
  if(!boss.enraged&&boss.hp<boss.mhp*.4){boss.enraged=true;boss.spd*=1.7;snd('brr');bwarn=80;bwt='魔王狂暴！';sfl=15;sfc='#f00';}
  if(boss.chrg){
    boss.x+=boss.cvx;boss.y+=boss.cvy;boss.cT--;
    const d=Math.hypot(boss.x-pl.x,boss.y-pl.y);
    if(d<pl.r+boss.r-8){
      if(!shOn){pl.hp-=25;snd('dmg');sfl=12;sfc='#f00';uHUD();if(pl.hp<=0){gameOver();return;}}
      else pts(pl.x,pl.y,'#88f',6);
      boss.chrg=false;
    }
    if(boss.cT<=0) boss.chrg=false;
  } else {
    const dx=pl.x-boss.x,dy=pl.y-boss.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    boss.x+=dx/d*boss.spd;boss.y+=dy/d*boss.spd;
    boss.x=Math.max(boss.r,Math.min(W-boss.r,boss.x));
    boss.y=Math.max(boss.r,Math.min(H-boss.r,boss.y));
    boss.shT++;
    if(boss.shT>=(boss.enraged?28:48)){
      boss.shT=0;snd('bsh');
      const ba=Math.atan2(pl.y-boss.y,pl.x-boss.x);
      bbuls.push({x:boss.x,y:boss.y,vx:Math.cos(ba)*5,vy:Math.sin(ba)*5,r:6,life:110,col:'#f80'});
    }
    boss.aT++;
    if(boss.aT>=240){
      boss.aT=0;const dx2=pl.x-boss.x,dy2=pl.y-boss.y,d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
      boss.chrg=true;boss.cT=20;boss.cvx=dx2/d2*9;boss.cvy=dy2/d2*9;
      snd('brr');bwarn=40;bwt='魔王衝鋒！';
    }
  }
  bbuls.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
  bbuls=bbuls.filter(b=>b.life>0&&b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20);
  bbuls.forEach(b=>{
    if(Math.hypot(b.x-pl.x,b.y-pl.y)<pl.r+b.r-4){
      b.life=0;
      if(!shOn){pl.hp-=12;snd('dmg');sfl=8;sfc='#f00';uHUD();if(pl.hp<=0){gameOver();return;}}
      else pts(pl.x,pl.y,'#88f',4);
    }
  });
  buls.forEach(b=>{
    if(!boss||b.life<=0) return;
    if(Math.hypot(b.x-boss.x,b.y-boss.y)<boss.r){
      boss.hp--;b.life=0;pts(b.x,b.y,'#f55',3);
      if(boss.hp<=0) checkBossDead(); else uHUD();
    }
  });
}

function loop(){
  if(gs!=='playing') return;
  update();drawAll();fid=requestAnimationFrame(loop);
}

function update(){
  const ddx=(dpad.right?1:0)-(dpad.left?1:0);
  const ddy=(dpad.down?1:0)-(dpad.up?1:0);
  const l=Math.sqrt(ddx*ddx+ddy*ddy)||1;
  if(ddx||ddy){pl.x=Math.max(pl.r,Math.min(W-pl.r,pl.x+ddx/l*pl.spd));pl.y=Math.max(pl.r,Math.min(H-pl.r,pl.y+ddy/l*pl.spd));}
  if(scd2>0) scd2--;
  skCd=skCd.map(c=>Math.max(0,c-1));
  if(shT>0){shT--;if(shT<=0)shOn=false;}
  if(sfl>0) sfl--;
  if(bwarn>0) bwarn--;
  fxs.forEach(f=>f.life--);fxs=fxs.filter(f=>f.life>0);
  if(firing) shoot();
  spt++;
  if(!boss&&spt>=Math.max(30,80-wave*10)){spawnZ();spt=0;}
  buls.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
  buls=buls.filter(b=>b.life>0&&b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10);
  zoms.forEach(z=>{
    if(z.dead) return;
    const dx=pl.x-z.x,dy=pl.y-z.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    z.x+=dx/d*z.spd;z.y+=dy/d*z.spd;
    if(d<pl.r+z.r-4){pts(z.x,z.y,'#f55',4);z.dead=true;
      if(!shOn){pl.hp-=20;snd('dmg');sfl=10;sfc='#f00';uHUD();if(pl.hp<=0){gameOver();return;}}
      else pts(pl.x,pl.y,'#88f',6);}
  });
  buls.forEach(b=>{
    zoms.forEach(z=>{
      if(z.dead||b.life<=0) return;
      if(Math.hypot(b.x-z.x,b.y-z.y)<z.r){
        z.hp--;b.life=0;pts(z.x,z.y,'#f55',3);
        if(z.hp<=0){z.dead=true;kills++;snd('kill');pts(z.x,z.y,'#3f3',5);uHUD();}else snd('hit');
      }
    });
  });
  zoms=zoms.filter(z=>!z.dead);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.88;p.vy*=.88;p.life-=.055;});
  parts=parts.filter(p=>p.life>0);
  uSkUI();
  if(!boss&&kills>=goalK){
    if(wave===1){wave++;goalK=wKG[1];kills=0;zoms=[];pl.hp=Math.min(pl.mhp,pl.hp+30);snd('clr');bwarn=80;bwt='第1關過關！';uHUD();}
    else if(wave===2){wave++;goalK=0;kills=0;zoms=[];pl.hp=Math.min(pl.mhp,pl.hp+40);snd('clr');spawnBoss();}
  }
  updBoss();
}

function drawAll(){
  cx.fillStyle='#1a1a2e';cx.fillRect(0,0,W,H);
  for(let gx=0;gx<W;gx+=36) for(let gy=0;gy<H;gy+=36){cx.strokeStyle='rgba(255,255,255,.025)';cx.strokeRect(gx,gy,36,36);}
  if(sfl>0){cx.fillStyle=sfc;cx.globalAlpha=sfl/22;cx.fillRect(0,0,W,H);cx.globalAlpha=1;}
  fxs.forEach(f=>{
    cx.strokeStyle='rgba(150,150,255,'+f.life/12+')';cx.lineWidth=1.5+f.life/8;
    cx.beginPath();cx.moveTo(f.x1,f.y1);
    cx.quadraticCurveTo((f.x1+f.x2)/2+(Math.random()-.5)*20,(f.y1+f.y2)/2+(Math.random()-.5)*20,f.x2,f.y2);
    cx.stroke();cx.lineWidth=1;
  });
  parts.forEach(p=>{cx.globalAlpha=p.life;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,2.5,0,Math.PI*2);cx.fill();});
  cx.globalAlpha=1;
  zoms.forEach(z=>{
    cx.fillStyle='#2d5a1b';cx.beginPath();cx.arc(z.x,z.y,z.r,0,Math.PI*2);cx.fill();
    cx.fillStyle='#5f0';cx.font='bold 10px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('Z',z.x,z.y);
    cx.fillStyle='#300';cx.fillRect(z.x-z.r,z.y-z.r-6,z.r*2,3);
    cx.fillStyle='#5f0';cx.fillRect(z.x-z.r,z.y-z.r-6,z.r*2*(z.hp/z.mhp),3);
  });
  bbuls.forEach(b=>{cx.fillStyle=b.col;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.fillStyle='rgba(255,200,0,.3)';cx.beginPath();cx.arc(b.x,b.y,b.r+2.5,0,Math.PI*2);cx.fill();});
  if(boss){
    const p=Math.sin(Date.now()/200)*.1+.92;
    cx.save();cx.translate(boss.x,boss.y);
    if(boss.chrg){cx.strokeStyle='rgba(255,100,0,.7)';cx.lineWidth=3.5;cx.beginPath();cx.arc(0,0,boss.r+6,0,Math.PI*2);cx.stroke();}
    if(boss.enraged){cx.strokeStyle='rgba(255,0,0,'+(0.3+Math.sin(Date.now()/80)*.3)+')';cx.lineWidth=6;cx.beginPath();cx.arc(0,0,boss.r+11,0,Math.PI*2);cx.stroke();}
    cx.fillStyle='#6b1a1a';cx.beginPath();cx.arc(0,0,boss.r*p,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#f44';cx.lineWidth=2;cx.beginPath();cx.arc(0,0,boss.r*p,0,Math.PI*2);cx.stroke();cx.lineWidth=1;
    for(let i=0;i<4;i++){const a=boss.ang+i*Math.PI/2;cx.fillStyle='rgba(255,80,0,.6)';cx.beginPath();cx.arc(Math.cos(a)*boss.r*.7,Math.sin(a)*boss.r*.7,4,0,Math.PI*2);cx.fill();}
    cx.fillStyle='#ff0';cx.beginPath();cx.arc(-7,-3,4,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(7,-3,4,0,Math.PI*2);cx.fill();
    cx.fillStyle='#f00';cx.beginPath();cx.arc(-7,-3,1.8,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(7,-3,1.8,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#f88';cx.lineWidth=1.5;cx.beginPath();cx.arc(0,7,8,0,Math.PI);cx.stroke();cx.lineWidth=1;
    cx.fillStyle='#f44';cx.font='bold 9px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('BOSS',0,0);
    cx.restore();
    const bw=boss.r*2.5;
    cx.fillStyle='#300';cx.fillRect(boss.x-bw/2,boss.y-boss.r-12,bw,4);
    const bp=boss.hp/boss.mhp;
    cx.fillStyle=bp>.5?'#f44':bp>.25?'#f80':'#ff0';cx.fillRect(boss.x-bw/2,boss.y-boss.r-12,bw*bp,4);
  }
  buls.forEach(b=>{cx.fillStyle='#ff0';cx.beginPath();cx.arc(b.x,b.y,3.5,0,Math.PI*2);cx.fill();});
  if(shOn){cx.strokeStyle='rgba(100,150,255,'+(0.4+Math.sin(Date.now()/100)*.2)+')';cx.lineWidth=2.5;cx.beginPath();cx.arc(pl.x,pl.y,pl.r+7,0,Math.PI*2);cx.stroke();cx.lineWidth=1;}
  cx.save();cx.translate(pl.x,pl.y);cx.rotate(autoAimAngle);
  cx.fillStyle=shOn?'#88f':'#4af';cx.beginPath();cx.arc(0,0,pl.r,0,Math.PI*2);cx.fill();
  cx.fillStyle='#8df';cx.fillRect(3,-3,14,6);cx.restore();
  if(bwarn>0){
    cx.globalAlpha=Math.min(1,bwarn/28);
    cx.fillStyle=bwt.includes('過關')?'#4f4':bwt.includes('狂暴')||bwt.includes('衝鋒')?'#f55':'#ff0';
    cx.font='bold 18px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(bwt,W/2,H/2-50);cx.globalAlpha=1;
  }
}

function gameOver(){
  gs='dead';cancelAnimationFrame(fid);
  document.getElementById('omsg').textContent='你被消滅了！';
  document.getElementById('osub').textContent='擊殺了 '+kills+' 隻殭屍';
  document.getElementById('obtn').textContent='再試一次';
  document.getElementById('ov').style.display='';
  uSkUI();drawAll();
}
function winGame(){
  gs='win';cancelAnimationFrame(fid);
  document.getElementById('omsg').textContent='恭喜通關！🎉';
  document.getElementById('osub').textContent='魔王已消滅！你是殭屍獵人！';
  document.getElementById('obtn').textContent='再玩一次';
  document.getElementById('ov').style.display='';
  uSkUI();drawAll();
}

function setupControls(){
  const dirs={
    'dp-up':'up','dp-down':'down','dp-left':'left','dp-right':'right'
  };
  Object.entries(dirs).forEach(([id,k])=>{
    const el=document.getElementById(id);
    const on=e=>{e.preventDefault();ra();dpad[k]=true;el.classList.add('active');};
    const off=e=>{e.preventDefault();dpad[k]=false;el.classList.remove('active');};
    el.addEventListener('touchstart',on,{passive:false});
    el.addEventListener('touchend',off,{passive:false});
    el.addEventListener('touchcancel',off,{passive:false});
    el.addEventListener('mousedown',on);
    el.addEventListener('mouseup',off);
    el.addEventListener('mouseleave',off);
  });
  const fire=document.getElementById('fire-btn');
  const fon=e=>{e.preventDefault();ra();firing=true;fire.classList.add('active');};
  const foff=e=>{e.preventDefault();firing=false;fire.classList.remove('active');};
  fire.addEventListener('touchstart',fon,{passive:false});
  fire.addEventListener('touchend',foff,{passive:false});
  fire.addEventListener('touchcancel',foff,{passive:false});
  fire.addEventListener('mousedown',fon);
  fire.addEventListener('mouseup',foff);
  fire.addEventListener('mouseleave',foff);
  for(let i=0;i<4;i++){
    const b=document.getElementById('skb'+i);
    const tap=e=>{e.preventDefault();ra();useSkill(i);b.classList.add('active');setTimeout(()=>b.classList.remove('active'),150);};
    b.addEventListener('touchstart',tap,{passive:false});
    b.addEventListener('mousedown',tap);
  }
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') dpad.up=true;
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') dpad.down=true;
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') dpad.left=true;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') dpad.right=true;
    if(e.key===' '){firing=true;ra();}
    if(e.key==='1')useSkill(0);if(e.key==='2')useSkill(1);if(e.key==='3')useSkill(2);if(e.key==='4')useSkill(3);
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  });
  document.addEventListener('keyup',e=>{
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') dpad.up=false;
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') dpad.down=false;
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') dpad.left=false;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') dpad.right=false;
    if(e.key===' ') firing=false;
  });
}

document.getElementById('obtn').addEventListener('click',startGame);
setupControls();
cx.fillStyle='#1a1a2e';cx.fillRect(0,0,W,H);
</script>
